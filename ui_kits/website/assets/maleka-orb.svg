<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Maleka AI Studio assistant orb">
  <defs>
    <radialGradient id="mkSphere" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#1b2a4a" />
      <stop offset="55%" stop-color="#0c1428" />
      <stop offset="100%" stop-color="#05070f" />
    </radialGradient>
    <linearGradient id="mkCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cf6ff" />
      <stop offset="100%" stop-color="#22a7dc" />
    </linearGradient>
    <linearGradient id="mkViolet" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b48bff" />
      <stop offset="100%" stop-color="#6a5cff" />
    </linearGradient>
    <radialGradient id="mkGloss" cx="38%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="mkGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <clipPath id="mkClip"><circle cx="100" cy="100" r="88" /></clipPath>
  </defs>

  <!-- ambient outer glow -->
  <circle cx="100" cy="100" r="92" fill="#22d3ee" opacity="0.10" filter="url(#mkGlow)" />

  <!-- sphere body -->
  <circle cx="100" cy="100" r="88" fill="url(#mkSphere)" />

  <g clip-path="url(#mkClip)">
    <!-- faint circuit traces -->
    <g stroke="#3aa9d6" stroke-width="1" fill="none" opacity="0.22">
      <path d="M30 78 H70 V58 H96" />
      <path d="M150 120 H118 V140 H92" />
      <path d="M44 132 H74 V150" />
      <path d="M164 84 H132 V66" />
      <circle cx="96" cy="58" r="2.4" fill="#3aa9d6" stroke="none" />
      <circle cx="92" cy="140" r="2.4" fill="#3aa9d6" stroke="none" />
      <circle cx="132" cy="66" r="2.4" fill="#3aa9d6" stroke="none" />
    </g>

    <!-- interlaced infinity light-trails -->
    <g fill="none" stroke-linecap="round" filter="url(#mkGlow)">
      <path d="M58 118 C58 78 92 78 100 100 C108 122 142 122 142 82 C142 52 108 60 100 96"
            stroke="url(#mkViolet)" stroke-width="6" opacity="0.9" />
      <path d="M142 82 C142 122 108 122 100 100 C92 78 58 78 58 118 C58 148 92 140 100 104"
            stroke="url(#mkCyan)" stroke-width="6" opacity="0.95" />
    </g>

    <!-- glossy top highlight -->
    <ellipse cx="82" cy="70" rx="58" ry="42" fill="url(#mkGloss)" />
  </g>

  <!-- rim light -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#8fe8ff" stroke-opacity="0.35" stroke-width="1.4" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="#000000" stroke-opacity="0.5" stroke-width="0.6" />
</svg>
